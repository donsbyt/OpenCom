<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenCom Support · Page Not Found</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="support-body support-body-public">
    <div class="support-bg support-bg-public"></div>
    <div class="support-page">
      <header class="support-topbar">
        <a class="support-brand" href="/" rel="noreferrer">
          <span class="support-brand-mark" aria-hidden="true"></span>
          <span class="support-brand-copy">
            <strong>OpenCom</strong>
            <span>Support Centre</span>
          </span>
        </a>
      </header>

      <main class="split-layout split-layout-public public-workspace">
        <section class="card card-primary workspace-card workspace-card-main">
          <div class="section-head">
            <div>
              <p class="eyebrow">404</p>
              <h1>That support page does not exist.</h1>
              <p class="section-subcopy">
                The link may be broken, expired, or missing part of the path.
                You can head back to the main support portal and reopen your
                ticket from there.
              </p>
            </div>
          </div>
          <div class="action-row">
            <a class="primary-btn hero-btn-link" href="/">Open support home</a>
            <a class="secondary-btn hero-btn-link" href="/?category=unban_appeal">Start an appeal</a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
