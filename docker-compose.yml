version: "3.9"

x-backend-service: &backend-service
  build:
    context: ./backend
    dockerfile: Dockerfile
  image: opencom-backend-local:latest
  env_file:
    - ./backend/.env
    - ./backend/.env.docker
  restart: unless-stopped
  working_dir: /app/backend
  init: true

services:
  mariadb-core:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ods_core
      MARIADB_USER: ods
      MARIADB_PASSWORD: ods
    ports:
      - "${DOCKER_LOCAL_BIND_IP:-127.0.0.1}:${CORE_DB_PORT:-3307}:3306"
    volumes:
      - mariadb_core:/var/lib/mysql

  mariadb-node:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ods_node
      MARIADB_USER: ods
      MARIADB_PASSWORD: ods
    ports:
      - "${DOCKER_LOCAL_BIND_IP:-127.0.0.1}:${NODE_DB_PORT:-3308}:3306"
    volumes:
      - mariadb_node:/var/lib/mysql

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "${DOCKER_LOCAL_BIND_IP:-127.0.0.1}:${REDIS_PORT:-6379}:6379"

  minio:
    profiles: ["optional-storage"]
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123456
    ports:
      - "${DOCKER_LOCAL_BIND_IP:-127.0.0.1}:${MINIO_API_PORT:-9100}:9000"
      - "${DOCKER_LOCAL_BIND_IP:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - minio_data:/data

  core:
    <<: *backend-service
    depends_on:
      redis:
        condition: service_started
    command: /bin/sh -lc "npm run migrate:core && npm run start:core"
    ports:
      - "${CORE_HTTP_PORT:-3001}:3001"
      - "${CORE_GATEWAY_PORT_PUBLIC:-9001}:9001"
    volumes:
      - core_logs:/app/backend/logs
      - core_profiles:/app/backend/storage/profiles
      - core_attachments:/app/backend/data/attachments

  node:
    <<: *backend-service
    depends_on:
      core:
        condition: service_started
    command: /bin/sh -lc "npm run migrate:node && npm run start:node"
    ports:
      - "${NODE_HTTP_PORT:-3002}:3002"
      - "${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}:${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}/udp"
      - "${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}:${MEDIASOUP_RTC_MIN_PORT:-40000}-${MEDIASOUP_RTC_MAX_PORT:-40100}/tcp"
    volumes:
      - node_logs:/app/backend/logs
      - node_attachments:/app/backend/data/attachments

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: opencom-frontend-local:latest
    env_file:
      - ./frontend/.env
      - ./frontend/.env.docker
    restart: unless-stopped
    init: true
    depends_on:
      core:
        condition: service_started
      node:
        condition: service_started
    environment:
      FRONTEND_INTERNAL_PORT: "5173"
    ports:
      - "${FRONTEND_PORT:-5173}:5173"

volumes:
  mariadb_core:
    name: opencom_mariadb_core
  mariadb_node:
    name: opencom_mariadb_node
  minio_data:
    name: opencom_minio_data
  core_logs:
    name: opencom_core_logs
  core_profiles:
    name: opencom_core_profiles
  core_attachments:
    name: opencom_core_attachments
  node_logs:
    name: opencom_node_logs
  node_attachments:
    name: opencom_node_attachments
